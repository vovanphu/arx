# tmux.conf - Managed by Chezmoi
# Minimal config, no external plugins, no TPM.

# ----- Prefix -----
# C-b conflicts with readline backward-char. C-a is easier to reach.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- General -----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-kitty:RGB,alacritty:RGB"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ----- Copy mode (vi keys) -----
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ----- Splits (intuitive: | vertical, - horizontal, keep cwd) -----
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ----- Pane navigation (vim-style, no prefix) -----
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ----- Pane resize -----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----- Reload config -----
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ----- Status bar (minimal) -----
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g status-left-length 30
set -g status-right-length 40
setw -g window-status-current-style "fg=black,bg=green"
