      hydra: # Proxmox Host (Bare Metal) - Minimal, PVE handles the rest
        - "openssh-server"
        - "htop"
        - "ncdu"
        - "neofetch"
        - "zram-tools"
        - "ksmtuned"
      griffin: # formerly MobileLab (Debian + KVM)
        - "openssh-server"
        - "qemu-kvm"
        - "libvirt-daemon-system"
        - "libvirt-clients"
        - "bridge-utils"
        - "virt-manager"
        - "htop"
        - "ncdu"
        - "zram-tools"
        - "ksmtuned"
      cyclops: # General Purpose Server
        - "openssh-server"
        - "nginx"
        - "net-tools"
      cerberus: # Bastion/Gateway
        - "openssh-server"
        - "fail2ban"
        - "ufw"
        - "wireguard-tools"
      golem: # Database/Stateful
        - "openssh-server"
        - "postgresql-client"
        - "redis-tools"
      minion: # Worker/Compute
        - "openssh-server"
        - "docker.io"
        - "htop"
      siren: # Web/Proxy
        - "openssh-server"
        - "nginx"
        - "certbot"
        - "python3-certbot-nginx"
      kraken: # Ceph/Storage Node
        - "openssh-server"
        - "ceph-common"
        - "xfsprogs"
        - "smartmontools"

  # Fedora packages (dnf)
  fedora:
    common:
      - "git"
      - "curl"
    extras: # Installed if NOT 'server' role
      - "neovim"
      - "ripgrep"
      - "fzf"
      - "zoxide"
      - "starship"
    roles:
