        - "ansible"
        # - "kubectl"
      chimera: # Formerly Workstation
        - "openssh-server"
        - "@Development Tools"
        - "gcc-c++"
        - "gcc"
        - "make"
      hydra: # Proxmox Host (Bare Metal) - Minimal, PVE handles the rest
        - "openssh-server"
        - "htop"
        - "ncdu"
        - "neofetch"
        - "zram-generator-defaults"
        - "tuned"
      griffin: # MobileLab (Fedora + KVM)
        - "openssh-server"
        - "qemu-kvm"
        - "libvirt-daemon-system"
        - "libvirt-client"
        - "bridge-utils"
        - "virt-manager"
        - "htop"
        - "ncdu"
        - "zram-generator-defaults"
        - "tuned"
      cyclops: # General Purpose Server
        - "openssh-server"
        - "nginx"
        - "net-tools"
      cerberus: # Bastion/Gateway
        - "openssh-server"
        - "fail2ban"
        - "firewalld"
        - "wireguard-tools"
      golem: # Database/Stateful
        - "openssh-server"
        - "postgresql"
        - "redis"
      minion: # Worker/Compute
        - "openssh-server"
        - "docker"
        - "docker-compose"
        - "htop"
      siren: # Web/Proxy
        - "openssh-server"
        - "nginx"
        - "certbot"
        - "python3-certbot-nginx"
      kraken: # Ceph/Storage Node
        - "openssh-server"
        - "ceph"
        - "xfsprogs"
        - "smartmontools"
