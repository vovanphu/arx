# alacritty.toml - Managed by Chezmoi
# Minimal config. Scrollback disabled -- tmux handles it.

[general]
import = []

[env]
TERM = "alacritty"

[window]
padding = { x = 4, y = 4 }
decorations = "full"
opacity = 1.0
startup_mode = "Windowed"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 11.0

[scrolling]
# tmux manages scrollback -- keep this low to avoid double buffering
history = 0

[terminal]
shell = { program = "/bin/bash" }

[cursor]
style = { shape = "Block", blinking = "Off" }

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"
